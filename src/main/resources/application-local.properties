# ===============================
# DATABASE (HIGH IMPACT)
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# HikariCP (connection pool tuning)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update

# Disable in production (slow)
spring.jpa.show-sql=false

# Avoid lazy loading issues + improve performance
spring.jpa.open-in-view=false

# Reduce unnecessary SQL formatting/logging
spring.jpa.properties.hibernate.format_sql=false

# ===============================
# SERVER (THREAD PERFORMANCE)
# ===============================
server.port=${PORT:8080}

# Increase request handling capacity
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# ===============================
# LOGGING (VERY IMPORTANT)
# ===============================
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=OFF

# ===============================
# RESPONSE COMPRESSION (BIG WIN FOR PERFORMANCE)
# ===============================
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024

# ===============================
# TIMEZONE
# ===============================
spring.jackson.time-zone=Asia/Kolkata
spring.jpa.properties.hibernate.jdbc.time_zone=UTC